apiVersion: v1
kind: ConfigMap
metadata:
  name: erp-configmap
  namespace: erp-dev
  labels:
    app: erpgo-saas
    environment: production
data:
  APP_NAME: "ERPGo SaaS"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_TIMEZONE: "UTC"
  APP_URL: "http://localhost:8000"

  # Locale settings
  APP_LOCALE: "en"
  APP_FALLBACK_LOCALE: "en"
  APP_FAKER_LOCALE: "en_US"

  # Logging
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "error"

  # Database (without credentials)
  DB_CONNECTION: "mysql"
  DB_HOST: host.docker.internal
  DB_PORT: "3306"
  DB_DATABASE: "pos"

  # Session & Cache
  SESSION_DRIVER: "file"
  SESSION_LIFETIME: "120"
  CACHE_DRIVER: "file"
  CACHE_STORE: "file"
  QUEUE_CONNECTION: "database"

  # Redis
  REDIS_HOST: "redis-service" # Changed for K8s
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "null"

  # Mail
  MAIL_DRIVER: "smtp"
  MAIL_HOST: "smtp.mailtrap.io"
  MAIL_PORT: "2525"
  MAIL_USERNAME: "null"
  MAIL_PASSWORD: "null"
  MAIL_ENCRYPTION: "null"
