apiVersion: apps/v1
kind: Deployment
metadata:
  name: gym-app
  namespace: gym-dev
  labels:
    app: gym-app

spec:
  replicas: 1
  selector:
    app: gym-app
template:
  metadata:
    labels:
      matchLabels:
        app: gym-app
  spec:
    containers:
      - name: gym-app-container
        image: chethan2527/gym:v1
        resources:
          requests:
            cpu: 250m
            memory: 100Mi
          limits:
            cpu: 400m
            memory: 150Mi
        envFrom:
          - configMapRef:
              name: gym-app-config
