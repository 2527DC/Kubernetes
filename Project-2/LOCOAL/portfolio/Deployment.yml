apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  labels:
    app: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
  template: # ← This was missing!
    metadata:
      name: portfolio
      labels:
        app: portfolio
    spec:
      containers:
        - name: portfolio
          image: chethan2527/portfolio:v1
          resources:
            requests:
              cpu: "250m"
              memory: "100Mi"
            limits:
              cpu: "500m"
              memory: "100Mi"
